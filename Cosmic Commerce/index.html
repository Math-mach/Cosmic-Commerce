<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Motor de Jogo - Fases do Turno</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Este é o contêiner principal para todo o jogo -->
    <div class="game-container">
      <!-- Painel da Esquerda (Informações e Fases) -->
      <div class="left-panel">
        <div id="ui-players-panel">
          <!-- Os painéis dos jogadores serão inseridos aqui pelo JavaScript -->
        </div>
        <div id="phase-indicator">
          <h3 id="phase-title">Fase do Turno</h3>
          <ul id="phase-actions">
            <li>Carregando...</li>
          </ul>
        </div>
      </div>

      <!-- Wrapper do Tabuleiro (Direita) -->
      <div class="board-wrapper">
        <h1>A Nebulosa Espiral</h1>
        <!-- O tabuleiro e os peões serão inseridos aqui -->
        <div id="unified-grid-container">
          <div id="peoes-container"></div>
        </div>
        <!-- Painel de Ações abaixo do tabuleiro -->
        <div id="ui-actions-panel">
          <div id="game-info">Carregando Jogo...</div>
          <button id="action-button">Aguarde</button>
        </div>
      </div>
    </div>

    <!-- O HTML só precisa carregar UM script. O main.js é o responsável por importar todo o resto. -->
    <script type="module" src="js/main.js"></script>
  </body>
</html>
