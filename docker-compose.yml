name: Cosmic Commerce
services:
    db:
        image: bitnami/postgresql:15
        container_name: postgres_db
        env_file:
            - ./postgres/.env
        ports:
            - "5432:5432"
        volumes:
            - db_data:/bitnami/postgresql
            - ./postgres:/docker-entrypoint-initdb.d
        restart: always

    redis:
        image: bitnami/redis:7.2
        container_name: redis_cache
        environment:
            - REDIS_PASSWORD=redispass123
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/bitnami/redis/data
        restart: always

    backend:
        build:
            context: ./backend
        container_name: node_backend
        ports:
            - "7000:7000"
        env_file:
            - ./backend/.env
        volumes:
            - ./backend:/app
        depends_on:
            - db
            - redis
        restart: always

volumes:
    db_data:
        name: db_data
    redis_data:
        name: redis_data
